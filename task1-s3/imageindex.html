<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 30px;
        }

        h1 {
            text-align: center;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
        }

        .card {
            background: white;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }

        img {
            width: 180px;
            height: 120px;
            object-fit: cover;
            border-radius: 4px;
            background: #ddd;
        }

        p {
            margin-top: 8px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>Image Gallery</h1>

<div class="gallery">

    <div class="card">
        <img src="image1.jpg" alt="Image 1">
        <p>Image 1</p>
    </div>

    <div class="card">
        <img src="image2.jpg" alt="Image 2">
        <p>Image 2</p>
    </div>

    <div class="card">
        <img src="image3.jpg" alt="Image 3">
        <p>Image 3</p>
    </div>

    <div class="card">
        <img src="image4.jpg" alt="Image 4">
        <p>Image 4</p>
    </div>

    <div class="card">
        <img src="image5.jpg" alt="Image 5">
        <p>Image 5</p>
    </div>

    <div class="card">
        <img src="image6.jpg" alt="Image 6">
        <p>Image 6</p>
    </div>

    <div class="card">
        <img src="image7.jpg" alt="Image 7">
        <p>Image 7</p>
    </div>

    <div class="card">
        <img src="image8.jpg" alt="Image 8">
        <p>Image 8</p>
    </div>

    <div class="card">
        <img src="image9.jpg" alt="Image 9">
        <p>Image 9</p>
    </div>

    <div class="card">
        <img src="image10.jpg" alt="Image 10 q">
        <p>Image 10</p>
    </div>

    

</div>

</body>
</html>
